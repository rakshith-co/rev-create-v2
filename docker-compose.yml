services:
  backend:
    build: ./backend
    container_name: revcreate-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    restart: unless-stopped
